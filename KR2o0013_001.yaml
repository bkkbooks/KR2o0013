body:
  text: 舊聞證誤卷一宋李心傳撰建隆至天禧每朝廷大禮二府必進官天聖二年南郊李許公懇言之乃止自是止加恩而已出宋敏求春明退朝録按國史太祖四郊二府加恩而已未嘗進官太宗六行大禮惟雍熙南郊端拱藉田二府進秩其四郊但加恩真宗初郊惟二相進秩其後三郊兩府始遷官爾宋所記差誤太祖少親戎事性好藝文即位未幾召山人郭無為於崇政殿説書至今講官所領階銜猶曰崇政殿説書焉出張藝叟畫墁録按國史仁宗用孫宣公之請以賈文元等四人為崇政殿説書崇政殿説書自此始抱腹山人郭無為乃太原宰相也崇政在太祖時為講武殿太宗太平興國八年五月始改唐至五代國初京師皆不禁打繖自祥符後始禁惟親王宗室得打繖其後通及宰相樞密出葉夢得石林燕語按會要國初惟親王得張蓋太宗時始許宰相樞密使用之此云國初不禁又云祥符後始及樞輔皆誤也乾德元年六月命大理正奚嶼知館陶縣常參官知縣自嶼等始也注實録建隆二年十一月以祠部郎中王景遜為河南令不知諸書何故乃言知縣始此豈令與知縣不同乎出李燾長編按京朝官出為赤縣令者不復帶本官自唐以來皆然如建隆四年以水部員外郎李􅀈為浚儀令柴自牧為兵部員外郎之類至是奚嶼始帶大理正出知館陶縣故史臣云常參官知縣自嶼始也然建隆二年六月甲寅曹州寃句令曹陟以清幹聞擢左拾遺知縣事又在奚嶼之前則常參官知縣不自嶼始矣豈非陟以就任改秩之故不得為事始而史臣特取常參官自京都出知外縣者而記之耶大抵國初之制朝官出為縣令則解內職朝官出為知縣則帶本官由此言之令與知縣不同甚明乾德三年春平蜀蜀宮人有入掖庭者太祖覽其鏡背云乾德四年鑄上大驚以問陶竇二內相二人曰蜀少主嘗有此號鑑必蜀中所鑄上曰作宰相須是讀書人自是大重儒臣出劉貢父詩話王晉公祜事宋太祖為知制誥太祖遣使魏州以便宜付之告之曰使還與卿王溥官職時溥為相也蓋魏州節度使符彥卿太宗夫人之父有飛語聞于上祜還以百口保彥卿帝怒貶護國軍行軍司馬華州安置七年不召太宗即位以兵部侍郎召不及見而薨初赴貶時親賔送於都門外謂曰意公作王溥官職矣祜笑曰祜不做兒子二郎必做二郎者文正公旦也出邵伯溫聞見前録按國史開寶二年二月以知制誥王祜知潞州七月魏帥符中令彥卿移鎮鳳翔八年王公自潞州移守魏此時王祁公罷相已六年晉公實自上黨徙魏不應云奉使還與卿王溥官職也符令傳云行至河南以在告滿百日免明年李莊武繼勳鎮大名即魏州晉公移襄州潭州代還知吏部選事六年坐忤參知政事盧多遜貶華州司馬不應云自魏州使還即貶也晉公本傳太平興國三年自華州起知河中府六年召為左司員外郎八年遷中書舍人雍熙三年知開封府四年以病罷為兵部侍郎據此則晉公自華隂再起恰十年邵謂太宗即位以兵部侍郎召不及見而薨者謬誤尤甚本朝父子狀元及第張去華子師德梁灝子固而已出王明清揮麈前録按開寶二年安德裕狀元及第五年子守亮繼之凡三家仲言遺其一耳石林燕語云國初取士猶用唐故事禮部放榜開寶六年李文正知舉下第進士徐士亷擊鼓自訟詔盧多遜即講武殿覆試於是再取宋凖而下二十六人自是遂為故事辨云時以李瑩侯陟郝益考試通得一百二十七人並放及第此云盧多遜覆試又云再取宋凖而下二十六人皆非出汪端明辨石林燕語按是舉覆試凡得進士二十六人明經三十人明禮十人三史三人學究十八人明法五人總諸科為百有二十七葉公所云專指進士汪公併諸科言之是以不同也上命曹彬潘美曹翰收江南以沈倫為判官臨行朝辭赴小殿燕餞酒半出一黃帕文字顧彬曰汝實儒將潘美曹翰桀悍恐不能制不用命者望朕所在焚香啓之自有處置諸人惶恐汗下沿路或欲攻劫及江南城破李主出降二人皆欲面縳之曹王以所授敕欲宣讀事遂解如此者數四功成還朝曹王面奏沿路及至軍前將佐皆用命一心乞納所降特敕後有旨宣赴後苑酒半諸人起納敕上令潘美啓封曹翰執讀執政環立展示乃一張白紙衆皆失色上笑再命飲極歡而退出建隆遺事按此一事諸雜記多言之互有不同然以史考之有可疑者太祖實録開寶七年九月癸亥命潁州團練使曹翰率兵先赴荆南丙寅以宣徽南院使曹彬馬軍都虞候李漢瓊判四方館事田欽祚同率軍赴荆南領戰棹兵沿江而下丁卯以山南東道節度使潘美步軍都虞候劉遇東上閣門使梁逈並領軍赴荆南十月壬辰彬等離荆南甲辰以彬為升州西南面行營馬步軍戰棹都部署美為都監翰為先鋒都指揮使當出軍時曹潘二公蓋先後受命然武惠嘗平嶺南為大將恐太祖不應有是言沈倫者本名義倫時已為集賢相太宗即位去義字此云沈倫為判官妄也沈相乃伐西川時為轉運使耳江南既平曹翰攻江州尚未下九年五月屠之六月賞功為桂州觀察使判潁州蓋翰未嘗還朝此云美啓封翰執讀亦誤矣意者太祖此旨為曹翰田欽祚輩設而傳者失之不可不辨太祖遣曹彬取江南潘美為副太祖知美有謀難制召二人升殿謂曰但大使斬得副使取得江南美震怖而出由是迄無敗事出祖宗獨斷按國史曹彬以宣徽使行潘美以山南東道節度使美不過闕也太祖所言蓋諭彬之副田欽祚等爾曹彬潘美伐太原將下曹麾兵稍却潘力爭進兵曹終不許既歸至京潘詢曹何故退兵不進曹徐語曰上嘗親征不能下下之則我輩速死既入對太祖詰之曹曰陛下神武聖智尚不能下臣等安能必取帝頷之而已太祖親征太原不能下開寶二年春也時曹武惠實掌兵扈駕明年命潘武惠伐嶺南四年嶺南平留知廣州五年兼嶺南轉運使六年還朝七年與曹武惠同伐江南諸國八年克之九年還朝是嵗太祖崩二公未嘗共伐太原也按史開寶元年嘗伐北漢李繼勳為大將曹王為都監然上親征乃在次年此云神武聖智尚不能下蓋誤也太平興國四年曹王為樞密使潘武惠為北面都招討制置使二公同行然是嵗太宗乃親平太原亦與此録不合又按平晉之嵗太宗親征幽州不能下雍熙三年曹潘二王同出亦無功疑所云神武聖智不能下者指此然是役也曹出山前潘出山後潘克雲中五郡以曹失律遂班師實不同行此云曹麾兵稍却潘力爭亦非也曹既失律召還下吏責為衛將軍潘屯雁門如故久之乃入朝此云既還京曹語潘云云亦繆開寶後命中書樞密皆書時政記以授史官出葉夢得石林燕語按實録景德三年五月丙午樞密院始置時政記月終送中書用王文穆陳文忠之請也大中祥符中又命直送史館非始於開寶後葉誤矣太祖即位後有旨諸房子並稱皇子皇女有言恐無差別上曰猶子即子也新得天下便生分別朕不欲為也至太宗即位分皇子皇姪矣按史太平興國七年以前燕秦二王及魏悼王之子皆稱皇子故魏悼王長子德恭初除貴州防禦使稱皇第四子與德昭德芳同而其長女亦封雲陽公主女壻韓崇業除右衛將軍駙馬都尉循故事也七年夏魏王得罪下詔削其子女封爵且云德恭德隆宜稱皇姪於時燕秦二王已薨此云太宗即位分皇子皇姪蓋誤也國初取進士循唐故事每嵗多不過三十人太宗初即位天下已定有意於修文特取一百九人自唐以來未有也辨云國初取進士每嵗有不特三十人者出汪端明辨石林燕語按太祖一朝放進士十五榜李肅榜六人劉察榜七人蘇德祥李景陽張拱榜皆八人劉蒙叟柴務成安德裕安守亮榜皆十人張去華劉寅榜皆十一人髙適榜十五人楊礪榜十九人宋凖榜二十六人惟開寶八年王嗣宗一榜放三十一人葉不誤也太宗初即位張齊賢方赴廷試太宗欲其居上甲而有司偶失掄選置於丙科帝不悅有旨一榜盡與京官通判文定得將作監丞通判衡州不十年位宰相矣出邵伯溫聞見前録按會要太宗所取進士太平興國二年吕文穆蒙正榜凡五人第一等除將作監丞今之宣義郎第二等除大理評事今之承事郎並通判諸州三年胡祕監旦榜七十三人五年蘇參政易簡榜百一十八人皆倣此例邵氏謂以文定故一榜盡與京官通判者謬也文定實吕文穆榜第一等及第是時止分兩等安得有第三甲也後十五年文定乃拜相宋時見任官應進士舉雖中選止令遷官而不賜科第不中者則停見任其愛惜科名如此自淳化後遂皆賜第辨云太平興國五年單餗周繕賜及第餘皆節度掌書記非皆不賜第也出汪端明辨石林燕語此所辨未盡按史不中者停見任乃雍熙二年宋惠安李文正兩相之請非舊皆如此也真宗天禧二年既申嚴其制劉􅖙知制誥又請已受蔭者不許鎖試不行明年禮部貢院奏鎖廳不及格人姓名詔罰金十斤今後不得應舉天聖四年宋宣獻為翰林學士又請不及格人許再取應從之蓋自雍熙至天聖四十餘年未嘗有停任者太平興國六年九月以石熙載充樞密使注熙載以文資正官充使不知帶檢校官否據實録會要不帶檢校官乃自錢惟演始出李燾長編按石公初自朝散大夫刑部侍郎除中散大夫戶部尚書充使又自金紫光祿大夫戶部尚書罷為僕射皆不帶檢校官蓋前此文臣惟趙韓王嘗充而不帶正官至是以尚書代檢校官也及祥符中陳文忠王文穆並使真皇眷之厚乃不去正官而加檢校太尉自是冦萊公丁晉公馮魏公輩皆國之大臣謂不帶檢校官自錢文僖始蓋引祥符以來近例失于參考耳太宗時宋白賈黃中吕蒙正李至蘇易簡五人同時拜翰林學士承旨扈蒙贈之以詩曰五鳯齊飛入翰林其後蒙正為宰相黃中至易簡參知政事宋白官至尚書老於承旨皆為名臣出歐陽修歸田録按國史此太平興國八年五月事也實李文恭穆與宋賈吕李五公同入翰林後二年蘇易簡始為學士縣吏受郡事而下之縣者今皆曰祗候典訛也宋朝會要唐藩鎮皆置邸京師謂之上都留後院大歷十二年改為上都知進奏院托言夏侯孜僕曰擬作西川留後官以此言之乃借唐藩鎮留後吏目以為稱當曰知後典也按皇朝會要宋初緣舊制藩鎮皆置人為進奏官軍監場務轉運司則差知後官或副知掌之太平興國八年汰進奏知後官存百五十人並充進奏官罷知後官之名咸平五年復令進奏官各置守闕副知一名泰之所云祗候典當為知後者是矣而以為法唐藩鎮吏目以為稱則誤蓋知後官之名乃國初所創下於進奏官一等非唐之舊名也朱希真云太平興國中諸降王死其舊臣或宣怨言太宗盡收用之置之館閣使修羣書如册府元龜文苑英華太平廣記之類廣其卷帙厚其廩祿贍給以役其心多卒老於文字之間出王仲言揮麈後録按會要太平興國二年命學士李明逺扈日用偕諸儒修太平御覽一千卷廣記五百卷明年廣記成八年御覽成九年又命三公及諸儒修文苑英華一千卷雍熙三年成與修者乃李文恭穆楊文安徽之楊樞副礪賈參政黃中李參政至吕文穆蒙正宋文安白趙舍人鄰幾皆名臣也楊文安雖貫浦城然恥事偽廷舉後周進士第江南舊臣之與選者特湯光祿張師黯徐鼎臣杜文周吳正儀等數人其後湯徐並直學士院張參知政事杜官至龍圖閣直學士吳知制誥皆一時文人此謂多老於文字之間者誤也當修御覽廣記時李重光尚亡恙今謂因降王死而出怨言又誤矣册府元龜乃景德二年王文穆楊文公奉詔修朱説甚誤張融自密直守蜀歸為樞密副使建第差壯麗太宗一日語融曰聞卿建第甚雄朕方要一庫未成可輟之融即日遷居佛寺今新衣庫是也出王鞏聞見近録按陳和叔拜罷録太宗朝副樞密者凡十七人但有張遜張宏無張融也成都知府題名記太宗時亦無張融但有張忠定耳定國恐誤冦忠愍為執政尚少太宗嘗語人曰冦凖好宰相但年尚少耳忠愍乃服何首烏而食三白鬚髮遂變於是拜相出王鞏聞見録按冦公以淳化二年入宥府時年才三十一四年以與張遜不協罷五年復為參知政事至道二年又罷真宗咸平六年除三司使景德元年八月自三司拜相時年四十四矣此所記皆誤錢公若水為樞密副使時吕相端罷太宗明日謂輔臣曰聞吕端命下哭泣不已錢公厲聲曰安有此退謂諸公曰我輩眷戀爵祿上見薄如此遂力請罷此亦繆誤按錢公以至道元年正月除同知樞密院事四月吕公相三年三月太宗崩六月錢公罷咸平元年十月吕公免相皆與此不合唐有翰林侍書學士栁公權嘗為之太宗以王著為衛尉寺丞史館祗候使詳定急就章等後遂以為翰林侍書而不加學士之名蓋惜之也出葉夢得石林燕語按栁誠懸書何進滔等碑並云翰林學士承旨兼侍書無學士字唐史本傳誠懸初為侍書學士恥以技進求換散秩改𢎞文館學士文宗立復召侍書充書詔學士據此則侍書帶學士或不帶未足為重輕况國初翰林侍讀侍講亦不帶學士字與侍書同非謂靳之也咸平元年上自即位以來夜則召儒臣詢問得失或至夜分其後率以為常法聖政録云召侍講侍讀學士二年七月始置講讀學士此時未有今改為儒臣庶不相妨出李燾長編按翰林侍讀學士唐開元中置王涯權德輿等嘗為之後廢太平興國中太宗復置翰林侍讀以吕文仲為之尋又改為侍講迄真宗不易其任石守道所謂講讀學士即指此爾張忠定為御史中丞彈奏張丞相齊賢齊賢深以為恨言於上曰張詠本無文凡有申奏皆婚家王禹稱代之禹稱前在翰林作齊賢罷相制其詞醜詆故并欲中傷之公聞自辨因以所為文進上大悅祖宗時雖有磨勘法然自朝官以上悉中書行之蓋以別流品耳至道二年太宗祀南郊百官皆進秩時冦萊公參知政事素所喜者多得臺省清要官所惡及不知者即序進之廣州左通判右正言馮拯轉虞部員外郎右通判太常博士彭惟節乃轉屯田員外郎惟節自以素居馮下章奏列銜皆仍舊不易萊公怒特詔馮毋得亂經制馮憤因上疏極論冦公擅權太宗由是怒尋命出守此國史所書也仲言謂磨勘吏部成法非宰相所專乃元豐官制後事豈可謂蔡書抵牾耶按今郎官二十四階易以三朝郎右正言太常國子博士階易以一承議郎故磨勘止在吏部而已蔡書誠有抵牾者不在此條王沂公青州發解及南省廷試皆為第一中山劉子儀時為學士戲語之曰狀元試三場一生喫著不盡公正色曰曾平生之志不在溫飽出魏泰東軒筆録按國史沂公以咸平五年第進士後十八年劉子儀始為學士按劉子儀咸平元年及第在沂公前四年耳天禧四年子儀為學士此時沂公執政久矣冦忠愍公判天雄軍王文康公為轉運使奏公僭侈太宗怒問翰林承旨王明明曰此騃耳太宗從之公後以女適文康及謫雷州賴文康當國故得不死出蔣魏公逸史按冦公在長安走馬承受奏其僭侈真宗以問王魏公旦旦奏云云及謫雷州王文康為密直亦坐纍免蔣誤記也又國史冦公判天雄乃祥符初事是時朝文元李昌武楊大年在翰苑亦無王明明初自右職換禮部侍郎未嘗入北扉不知蔣何以鹵莽如此王文正李文定俱秉政文定曰外寧必有內憂三十年後東封西祀方在公等之手吾不見也文正為相果有東封西祀之事按契丹講和在景德元年後十二年李公始自陜西都轉運使入翰林為學士此事當指李文靖真宗既與契丹和親王文正公問于李文靖公曰和親何如文靖曰善則善矣但恐人主侈心生耳文正亦未以為然及真宗晚年多事巡遊大修宫觀文正乃潛歎曰李公可謂有先見之明矣按國史景德元年十二月契丹平此時李文靖之薨久矣王沂公久在外意求復用宋宣獻為參知政事甚善吕許公許公時為昭文相為沂公言曰孝先求復相公能容否吕公許諾宣獻曰孝先於公交契不淺果許則善待之不宜如復古也謂李文定吕公笑然之遂奏言王曾有意復入上許之吕公願以首相處之上不可許以亞相乃使宣獻問其可否沂公無所擇既至吕公專決事不少讓二公又不協出蘇轍龍川別志按國史景祐元年八月癸亥樞密使王文康公薨是月庚午召王沂公於河南為樞密使明年三月李文定公自集賢相罷沂公以次輔代其位恐非求復入也癸亥庚午相去七日爾豈容往來問可否耶既因人而求相又居右而不擇沂公決不然文定所記疑得之張宣徽大不可據宋真宗大漸之夕李文定與宰執以祈禳宿內殿時仁宗幼沖八大王元儼有威名以問疾留禁中纍日不肯出執政患之偶翰林司以金盂貯熟水曰王所需也文定取案上墨筆攪水中盡黑令持去王見之大驚意其有毒也即上馬去出邵伯溫聞見前録按真宗以乾興元年二月崩此時李文定得罪黜知鄆州久矣樞密使罷政降麻熙寧間吕穆公弼因爭新法求去王安石隂沮之只送舍人院命詞此恩例遂廢按國朝故事樞密使以使相若節度使罷又樞密使帶平章事而罷為散官則學士院降麻若樞密使不帶平章事而以散官罷則止舍人院命詞考之實録太平興國六年楚景襄罷為上將軍皇祐五年高文莊嘉祐四年田宣簡罷為觀文殿學士皆不降麻惟太平興國八年石元懿以僕射罷太宗眷之厚乃降麻耳外此降麻者十八人吳侍中李元靖曹武惠王忠肅冦忠愍曹襄悼錢文僖張榮僖楊恭毅王康靖夏文莊狄武襄王武恭賈文元宋元憲張康節富文忠文忠烈蓋皆以使相若節度使罷故誕告焉大中祥符七年王文穆陳文忠罷為尚書八年陳文忠再罷為僕射皆降麻者以二公悉帶平章事故也若楚景襄等則皆不降麻舊典明甚豈特吕宣徽哉况吕以觀文殿學士罷正與田高二公所除官同似非介甫沮之也淳化二年王顯罷蘇易簡草麻蓋以建節之故諌議大夫張師德謁向文簡公曰師德兩詣王相公門皆不得見恐為人輕毁望公從容明之一日方議知制誥公曰可惜張師德向公曰何謂公曰纍於上前説師德名家子有士行不意兩及吾門狀元及第榮進素定但當靜以待之耳若復奔競使無階而進者當何如也向公方以師德之意啓之公曰某處安得有人敢輕毁向公自稱師德適有闕望公弗遺公曰苐緩之使師德知聊以戒貪進激薄俗也出王文正遺事按實録張尚賢以大中祥符四年十一月及第掖垣叢志尚賢以天禧二年十一月知制誥此時及第才七年耳前一年王公已免相是時閣下乃盛文肅度劉子儀陳知微王章惠隨夏文莊竦凡五人若有闕則尚賢資甚淺恐亦未在議中曾子固隆平集云尚賢守道不回執政不悅在西掖者九年如此則似非奔競者宋真宗大中祥符六年十二月張齊賢卒齊賢以右僕射奉朝請與宰相向敏中爭娶薛惟吉妻敏中坐此罷按此咸平五年十月事也張公實判永興軍今云僕射奉朝請蓋誤楊文公在禁林真宗欲立章獻為后朝議欲得公作册文使丁晉公諭旨召至中書扣所坐之床曰幸得聨此坐矣公曰相公失言竟不撰册公亦罷去王文正在中書時已立章獻為宸妃矣公亦短之按本朝故事中宫册文多命二府大臣為之學士但草制耳然章獻為后時實不受册文公蓋不草制也况是時王文正公為首相丁崖州但參知政事何以獨召文公至中書諭旨耶章獻但為德妃明道初始創宸妃之名以封章懿此亦誤也劉子儀在南陽以翰林學士召中途改知成都彌年又召為學士至西京復加兩學士知鄭州謝表云蓬山已到屢為風引而回長安甚遙但覺日邊之近按國史劉子儀天禧四年自正字除翰林明年出守合肥乾興元年復入翰林頃之以中丞罷乂知汝隂天聖五年三入為學士承旨六年知廬州以老罷八年薨據此子儀實三入翰林未嘗守南陽成都及鄭州亦未嘗加兩學士曾記誤也據此謝表乃宋子京然宋實自真定移守成都自成都召為三司使以言者論列改三學士知鄭州亦與曾所記不合國朝宰執未有兼東宫職事者天禧末仁宗初立為皇太子命宰相丁謂馮拯兼少師少傅樞密使曹利用兼少保而任中正王曾為參政錢惟演為樞副皆兼賔客前此所無也出葉夢得石林燕語按仁宗初立為太子李文定以參政兼賔客後二年李遷集賢相兼少傅其十一月皇太子聽政遂命宰執悉兼東宫官葉所云誤王沂公當軸尤抑奔競張師德久次館閣博學有時望而不事造請最為魯簡肅公深知一日中書議除知制誥一人魯盛稱張才德沂公以未識為解魯屢諷張往見沂公公辭不見他日謂魯曰張君器識德行足以為此但尚有請謁耳逾年方命掌誥沂公之取人如此故當時士大夫務以沖晦自養出澠水燕談此尤謬誤張尚賢入西掖戊午冬也王孝先拜相魯貫文參大政壬戍秋也相去五年矣宋綬草丁謂貶詞曰無將之戒深著於魯經不道之誅難逃於漢法天下快之出丁謂傳按實録載謫詞首云無將之戒舊典甚明不道之辜常刑罔赦此承龍川志之誤而不之考丁晉公自平江軍節度使除兵部尚書參知政事節度使當降麻而朝議惜之遂止以制除近者陳相執中罷使相除僕射乃降麻龎相籍罷節度使除觀文殿大學士又不降麻蓋無定制也出歐陽修歸田録按唐制節度使除僕射尚書侍郎謂之納節皆不降麻止舍人院出制國朝故事罷使相則降麻趙韓王陳恭公富文忠賈文元王文公是也罷節度使則不降麻李從善李元靖丁晉公龎莊敏是也安得謂無定制哉韓忠獻自武康軍節度使除三司降麻非舊制也蓋中書之誤而學士無正之者又丁自保信軍節度使除吏部尚書參政此云自平江節度除兵部亦誤祖宗朝宰相罷免惟趙中令得使相餘多以本官歸班參樞亦然天禧中張文節始以侍讀學士知南京天聖中王文康以資政殿學士知陜州自慶厯後解罷免率皆得職焉出宋敏求春明退朝録按參知政事罷政得職名自景德二年王文穆始慶厯以前執政若薛簡肅宋宣獻李康靖朝文莊之流皆得資政殿學士蓋祖宗故事參樞善罷例皆進秩太宗執政三十九人惟王永圖陳晉公李文靖賈媧民冦忠愍溫恭肅六人以本官罷外此無不進秩者章郇公以侍郎為參知政事吕申公鄙其為人時宋宣獻以尚書為樞密副使申公即以為參知政事欲以逼公公之親友皆勸公引去公不為動久之宣獻卒乃求避位申公深愧之言於仁宗留之不遣及申公薨公遂秉政按此一段謬誤尤甚據國史章文獻景祐三年自學士承旨除同知樞密院寶元元年拜相未嘗為參政也又章拜相乃繼王章惠陳文惠之後此時吕文靖為北京留守實未薨章吕未嘗相繼秉政宋宣獻明道二年以侍郎參知政事是時章郇公才入翰苑康定元年宋宣獻以尚書再為參政是時章郇公已位丞相宋公嘗知樞密院事亦未嘗為副樞也
