body:
  text: 舊聞證誤卷三宋李心傳撰哲宗登極尊皇太后為太皇太后皇后為皇太后惟朱妃稱號未定太皇太后曰母以子貴朝廷宜詳議當優隆之時蔡確章惇尚在朝議久不決諂諛者謂亦當為皇太后守正者則曰止合稱皇妃太母曰自古無並為皇太后之禮當尊為皇太妃凡百禮儀並依皇后乘行龍擔子服用繖扇等皆紅百寮稱臣太母又增月給在皇后之上哲宗喜慰皇太妃謝曰非太皇太后妾何緣得此盛極按此一假尤差誤德妃朱氏為皇太妃當諸公議神宗遺制時已增入矣此云議久不決者妄也元豐八年六月甲戌詔皇太妃出入許乘擔子七月甲辰禮部尚書韓忠彥等言皇太妃在三年服內衣褥從物並淺淡生日節序物色依皇后例慶賀用箋百官不稱臣己巳禮部又言皇太妃生日節序物色其冠服之屬減皇后五分之一此云服用紅百寮稱臣月給在皇后之上皆誤也元祐三年秋詔增議太妃典禮禮官請擔子飾以龍鳳繖用紅冠服如皇后紹聖元年宣仁聖烈皇后既葬上中批付禮官於是坐六輿立宫殿名繖紅黃兼用月費內中批出他儀制如皇后蓋前後十年而始定其典禮此所記誤矣元祐初兩省以上官多內降差人韓玉汝患之簾前論列宣仁云相公門知有吕夷簡否劉太后時多有內降吕夷簡亦如此奏陳章獻云相公知否一小孩兒與一婦人不與人些恩澤怎生把握天下夷簡拜謝非臣所及韓曰維持天下正須公議不在私恩按宣仁垂簾內降差除兩省以上官蓋范忠宣范正獻蘇文定朱公掞之流也章子厚嘗奏云得非左右所薦后云皆大臣所薦非左右玉汝為相屢以除授私其子姪為臺諫所劾而此乃以擢用忠賢為章獻與人恩澤之比其誣罔抑甚矣章惇蔡卞起同文館獄劉摯梁燾同時死於嶺南貶所人亦疑之又杖殺內臣陳衍惇卞至作廢宣仁后詔時宣仁服未除請哲宗於靈殿宣讀施行欽聖后聞之號哭於宣仁靈前哲宗乃已出邵子文辨誣按宣仁后以元祐八年九月崩後四年同文獄起其十一月梁况之卒十二月劉莘老薨又明年三月乃殺陳衍此時宣仁除服久矣子文所記不誣但年月差誤章惇初貶謫元祐臣寮盡以白帖子行事燾按李清臣與惇爭論不已哲宗疑惇惇亦恐時鄭左丞雍以嘗為二王官寮屢致人言迹甚危欲結惇為自安計謂惇曰熙寧初王荆公相常用白帖子行事惇大喜取其案牘懷以白諸上惇遂安然鄭竟罷政尋被謫按章惇將貶元祐諸老先用林子中為中書舍人李掄所編丁未録中載元祐諸公謫詞甚備是必有録黃非用白帖子明矣范淳夫家傳云紹聖四年徙賔州元符元年移化州所被受止是白劄子疑子文指此而云然紹聖二年十月鄭公肅先出知陳州十一月安厚卿又出知河南四年正月李邦直又出知北京當用白劄子時此三人皆不在政府此說恐誤元祐名卿朱紱者君子人也嘗登禁從紹聖初不幸坐黨錮崇寧間亦有朱紱者蘇州人初登第欲希進用上疏自陳與姦人同姓名恐天下後世以為疑遂易名曰諤字聖豫蔡元長果大喜不次峻擢位至右丞未及正謝卒出王明清揮塵前録韓相縝有心術章惇畏之凡元祐執政從官惇必以事中之不敢及縝至縝死方使葉祖洽言不與贈諡而已按哲宗實録韓玉汝附傳縝守潁昌再上章引年未許給事中葉祖洽論縝垂簾之初首登相位交結張茂則梁簡諂事司馬光持祿養交以太子太保仍舊職致仕薨上為輟朝成服贈司空但不定諡而已史所書如此子文所記惇畏縝及不與贈官皆差誤况玉汝乃元豐執政雖遞遷於埀簾之初而俄與章蔡並逐豈可厠之元祐大臣耶紹聖初治元祐黨人凡嘗為宰執者無不坐貶惟蘇子容一人得免燕語辨云元祐宰相韓維執政李清臣許將紹聖以前皆無他李許仍再執政此云獨子容得免非也出汪端明辨石林燕語按韓玉汝元豐執政垂簾初但與蔡持正遞遷至相位既而為元祐諸公所擊去位非子容比也李邦直首建紹述之議許冲元依違兩可歷符祐崇靖之間皆為執政若槩之元祐宰執之間誤矣邢恕既為惇卞起獄不成每上殿移時不下惇果疑之出其元祐初謫隋州時上宣仁后自辨書稱宣仁功德有宗廟大計旬日之前固已先定之語遂入元祐黨責知安南軍此元符元年十月事也按恕為右史時嘗上宣仁后書言五事有儲二之建旬浹已前固已先定之語然實不曾降出章惇所出恕謫漢東時所上疏大抵稱美元祐初政且言已與司馬公晚受神宗之知却無此數語紹聖三年十月戊辰知瀛州路昌衡言伏覩朝㫖姚勔不與磨勘謹按勔罪大罰輕未厭輿論詔勔落寶文閣待制管勾洞霄宫注昌衡知瀛州何故言姚勔當考恐字有脫誤出李燾長編按此時每月以賞功罰罪事鏤板下諸州故昌衡奏狀有伏覩之語蓋時方排擊黨人是以出位論奏無害亦元祐中吳處厚箋蔡確車蓋亭詩之比耳按紹聖間鄭公肅不帶職周次元止帶待制非自西美始紹興後蕭德起符正明亦以次對為制帥不但曹王二人也西美初復次對知成都府後四年乃升雜學士充置使此所記誤崇寧五年冬末朱勔始進黃楊木三本按二年朱冲以獻花石得三班奉職不應以五年為始李孝廣崇寧間為成都漕以㸃檢卬州士人費義韋直方私試試卷詞理謗訕龎汝翼課冊係元祐學術譏詆元豐政事上聞三人並竄廣南孝廣遷官後紹興庚戌孝廣之子倞屬疾於婺州謂有妖孽招路時中治之時中始不肯倞託親舊叩問其詳時中云有一費義者獨不肯去吾亦莫知其故倞云若爾某疾不起矣因道向來費義等事實倞以告其父後義輩皆客死於路按此崇寧初事也後二人以大禮赦得歸直方更名革中進士第終安居令義更名允濟中進士甲科終漢州推官馮當可先生志其墓甚詳此云客死於道蓋誤又紹興無庚戌庚戌乃建炎四年而志云張丞相宣撫陜州費佐幕府意峭直難合出為漢州推官據史魏公以建炎三年己酉十一月至漢中則費君入幕出幕又死於漢州決非一歲間事計李倞病時費尚未死也意者路時中億度妄云之詞不足信安堯臣上書諫復燕雲安惇由此追復正奉大夫安惇傳元符詔㫖按惇以政和三年八月追復正奉大夫以其夫人張氏自訴也重和元年十一月己未御筆惇雖未復舊官可特與正奉大夫遺表恩澤授堯臣承務郎蓋惇本官為光祿大夫贈特進今追復未盡而特用所復官推恩此云因堯臣上書復官誤矣政和初上欲建延福宫一日魯公命召諸巨璫來且有事約束時童貫楊戩賈祥藍從熙何欣皆奏禀以此上默已曉因戲之曰汝等必作過今為師臣定行遣汝等矣諸璫莫測咸變色而詣省魯公則戒之曰恐至尊暑熱汝等各辦事建一二納凉之所朝廷當一切應副汝也於是改作延福五位按此政和三年事也蔡京素與宦者交結必相表裏此云師臣行遣又云諸璫變色皆妄也况童貫已為太尉恩數視二府矣可召至都堂爾汝之邪延福五位何欣藍從熙第一李穀第二此無穀名亦誤也李端叔為密院編修官曾文肅薦於上將以為右史命未下而為錢遹論罷暫泊潁昌為范忠宣草遺表上讀之稱賞將召用之而蔡元長入相時事大變端叔坐除名編管太平州按范公薨於建中靖國元年正月而蔡元長明年春始召還北門若上將擢端叔用之不應在朝踰年無除目也端叔政和三年九月除名王仲薿守㑹稽頗著績效如乾湖為田導水入海是也出王明清揮麈餘話按史明越州鑑湖夏蓋白馬竹溪廣德等十三湖自唐長慶中創立湖水髙於田田又髙於江海旱潦則遞相輸放其利甚溥自宣政間樓异守明王仲薿守越皆內交權臣專事應奉於是悉廢二郡陂湖以為田其租悉屬御前重和元年二月甲子詔鑑湖田租以備繕修原廟之需不許他司奏請他皆類此由是民失水利而官失省稅不可勝計紹興元年李莊簡為吏部侍郎奏請復之上虞令趙不搖奉詔考究自宣和元年至今湖田凡得米三萬三千餘斛入御前而納放者稅米十四萬六千餘斛得不償失遂復廢餘姚上虞二縣湖田其本末如此仲言所云誣矣宣和元年九月乙卯范致虛以母憂罷按謙叔去位在八月癸卯宣和庚子蔡元長當軸外祖曾空青守山陽時方臘據二浙甚熾初元長怨陳瑩中以陳嘗上書詆文肅編置郡中欲外祖甘心焉適瑩中告病外祖即令醫者朝夕診視具疾之進退與夫所供藥餌申官已而不起亦令作佛事僧衆下至凶肆之人悉入狀用印係案僚吏以為何至是外祖曰數日之後當知之已而朝廷遣淮南轉運使陸長民體究云盜賊方作未審陳瓘之死虛實外祖即以案牘繳奏以聞人始服其先見出王明清揮麈後録此尤謬誤按國史宣和二年方臘反時陳忠肅在南康有飛語云其子壻為賊所得欲以為相詔移楚州居住命守臣察之六年春忠肅卒於楚臘平久矣宣和三年辛丑盜起東南上慨然有一新政事之意廷䇿有二士對甚切直初考官陸德先等謂非宜言乞唱名日行遣有㫖送覆考考置第三等李丞相士美時以翰長充詳定官見二卷大竒之手疏論其忠鯁仍定上上等得㫖甲乙科已而呼臚乃劉寧止范宗尹也心傳嘗疑此事後見楊文靖公作周中丞武仲墓志云為殿試考官進士對策有極言切直者同列欲指為謗訕取㫖公云今盜起東南正國家開言路之時豈可吾儕先加以此名遂改為涉異奏之已而降㫖皆取於前列伯山宣政間本李士美客由此觀之伯山所書恐曲為士美地未可盡信也宣和七年七月庚午禁士民名字有犯天王君聖及主字者按此五字皆宣和以前所禁至此始罷之今乃以為禁非也重和元年九月禁天字二月禁君字五月禁聖字政和三年六月禁王字政和八年七月禁主字王正道三槐之裔祖端父毅俱以材顯靖康末李士美罷相就第正道直造拜於堂下願隨至禁中有欲白於上會有㫖令前宰執赴殿廷議事士美因攜之而入請募死士奉兩宫決圍南幸欽宗忠之以片紙批曰事成日可除尚書兵部侍郎出王明清揮麈後録案王正道乃文正弟旭之四世孫旭官至兵部郎中子端官至通議大夫端子元官至朝散大夫元子毅崇寧中為朝散郎上書勒停如此所云皆不審方城將破時未嘗召前宰執議事且李士美亦不在城中也敵人欲用正道為平灤漕非留守也蘇叔黨靖康中得倅真定赴官次河北道遇緑林脅使相從叔黨曰若曹知世有蘇內翰乎吾即其子肯隨爾輩草間求活耶通夕痛飲翌日視之卒矣惜乎世不知其此節也出王明清揮麈後録曹功顯自燕山逃歸顯仁令奏髙宗曰上再使敵中欲就鞍時二后洎宫人送至㕔前有小婢招兒見四金甲人衛上出王明清揮麈後録按欽宗實録上自康邸出使而顯仁皇后以龍德宫婉容居禁中召內知客韓公裔至􅒎子門屬以調護意此云送至㕔前當考二聖皇族既詣敵營中議亦取元祐皇后淵聖意邦昌必不能久僭欲留后以為興復基本因遣人入城取物紙尾批廋語與府尹徐秉哲云趙氏注孟子可相度分付㑹敵人以后廢久無預時事故不復取出朱勝非秀水間居録按實録敵取宗族皆據管宫閣內侍所供名字后實以廢處外宫不為敵所指名未必欲取而復止也况徐秉哲乃賣國之尤者豈可以情諭之邪秦㑹之嘗對方務德言靖康末與莫儔俱在敵寨時搜索宗室有未盡者儔陳計乞取玉牒其中有名盡行根刷會之在傍曰尚書誤矣譬如人家宗族不少有雖號同姓而情好極疏者平時富貴既不與共一旦禍患乃與之均恐無此理尼堪曰中丞之言是由此異待之出王明清揮麈後録按實録二月癸酉金人於宗正寺取玉牒簿指名取南班宗室自二王宫以下近屬及官序髙者先取此時秦㑹之未出城也㑹之所論或是三月庚子再取宗室時然儔獻計之日㑹之實不在傍此說不足據熙寧法宗子出仕者見謝辭及獨銜奏事並不著姓建炎元年某知鎮江府上謝表黃英州任中書侍郎乃令進奏官退回為不合不著姓殆欲見沮而不考著令也至今雖大宗正司宗室亦稱皇叔皇兄具官仍著姓矯枉太過誤矣按建炎指揮見中興㑹要時黃懋在中書取此㫖也然南班宗室初未嘗有著姓者此所云誤國朝宗子自祔葬山陵之外又有南墳西墳問諸宗子多南渡後始生無知之者建炎二年十月知汝州張抃奏劾其州官遁竄之罪有趙叔潛者結銜云保義郎添差管轄舒王已下墳圍有承節郎王世贇者其銜即云管轄魏王已下墳圍此云舒魏二王墳即南西二墳也邪國朝宗子分三祖藝祖太宗葬西京故宗子連惟字允字以上者並祔西洛魏悼王葬汝州故宗子連承字以下者並祔溫陽所謂西墳永安是也所謂南墳汝州是也國書中自可考據泰之嘗為從官矣乃不知此何邪秦㑹之范覺民同在廟堂二公不相咸敵騎初退欲定江西二守臣之罪康倬知臨江軍棄城而走撫守王仲山以城降仲山㑹之婦翁也覺民欲寬之㑹之云不可既已投拜委質於賊甚麼話不曾說豈可貸邪蓋詆覺民嘗仕僞楚耳出王明清揮麈餘話按敵入江西建炎三年冬也明年春敵退秦㑹之在逹賚軍中其年十月乃得歸紹興元年春始除參知政事此大誤矣建炎四年十二月尼堪籍諸路客户拘之入官次年春盡鎖之雲中耳上刺官字以志之河間府樂夀縣初縣客户六十八人而誤作六百八人以報後尼堪不容訴於是縣官驅窮民孤旅五百四十人以補數至則一例賣之莫能辨也按建炎三年秋已書升樂夀縣為夀州此仍稱縣者誤也方務德守荆南有寓客張黜者魏公之族子出其乃翁所記建炎遺事一編云孔彥舟領衆十餘萬破荆南城時朝廷方經理北敵未暇討捕張單騎入城說諭彥舟使之效順又令討鍾相許以成功入川從宣撫司求賞相平張遂與彥舟心腹數人入蜀至夔又降說劇賊劉超未及宣撫司道遇族兄攫金不得乃先見魏公言張受賊賂厚不可信魏公然之張乞令彥舟屯荆南公不從令往黃州屯駐其徒皆不樂率衆渡淮降金按鍾相乃鼎州土豪以左道惑衆率人守鄉井孔彥舟為東平鈐轄因事叛去侵荆南諸郡攻長沙不克乃僞稱鍾相遂入之反奏相叛傅彥濟以宣機督軍討之不勝相遂自稱楚王此建炎四年二月也四月彥舟獲相送行在拜利州觀察使湖北副總管時朝廷命向伯恭帥潭為彥舟所拒賀子忱說巨冦馬友擊彥舟逐之彥舟引兵入江西明年二月吕元直奉詔討李成乃奏彥舟同擊賊成敗降劉豫其秋以彥舟為蘄黃鎮撫使實代成明年五月權端明邦彥入樞府權故東平帥也彥舟心不自安偶韓良臣破閩湘諸盜順流而東彥舟疑其圖已遂引所部降僞齊以首末考之彥舟賞功及除拜皆朝命非自宣撫司且賞典已厚又距其叛去已二年蓋張所記多大言不足信按孟富文以辛亥九月自户部尚書除江湖宣諭制置使使理財治盜未嘗兼閩中亦不除韓良臣是時辛企宗已在建寧朝廷又遣胡丞公督捕十月二日洪成季始自瑣闥遷吏書為言者論去後五日富文即除參知政事此時成季吏書除目尚未下安得云上已留參政擬狀數日也十一月五日富文除福建宣撫良臣副之其執事已彌月蓋方務德誤記而衆言又因之宗澤造戰車初是劉浩創造試之不可每一兩以二十五人為左角二十五人為右角二十五人為前拒二十五人為後拒共四隊凡一車用百人逮元帥府分遣澤往開德乃用浩車制旋造出趙甡之遺史按宗公遺事載其京城所造車式每乘用五十有五運車者十有一執器械輔車者四十有四回旋曲折可以應用與趙公所記殊不同李綱私藏過於國帑厚自奉飬侍妾歌僮衣服飲食極於美麗每饗客殽饌必至百品遇出厨傳數十擔其居福州也張浚被召綱贐行一百二十合合以朱漆鏤銀裝飾樣制如一皆其宅庫所有者出朱勝非秀水間居録按李張二公皆渡江後名相此所云殊不可解豈非以張自福州還朝而薦李公起為江西大帥故以此汚之邪
