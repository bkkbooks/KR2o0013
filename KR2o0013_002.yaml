body:
  text: 舊聞證誤卷二宋李心傳撰仁宗天聖元年正月壬午度支副使陳堯佐兼知制誥故事知制誥皆先召試於中書堯佐預修眞宗實錄特免試焉出李燾長編按葉夣得避暑錄話本朝知制誥循唐制不試雍熈初太宗以李文靖公沆與宋湜王化基為之化基上章辭不能乃使中書並召試制誥二首遂為故事宋元憲撰掖垣叢志言梁周翰老於文學楊億望實素著堯佐以與修眞録皆免試焉歐陽公謂有國百年不試而命者才三人蓋誤也其後蘇子瞻劉貢父許冲元鄧温伯亦不試而除章懿之崩晏殊撰志文曰生女一人早卒無子仁宗恨之及親政内出志文以示宰相吕文靖解之上黙然乃命殊出守金陵如許公保全大臣眞宰相也及殊作相八王疾革上徃問疾王曰叔久不見官家不知今誰作宰相上曰晏殊也王曰此人名在圖䜟胡為用之上并記志文事欲重黜殊宋祁草麻力爭之乃降二官知潁州詞曰廣營産以殖私多役兵而規利以他事罪之殊免深譴祁之力也出蘓轍龍川别志按國史明道二年三月章獻崩四月乙未宰相吕夷簡判澶州執政晏殊等五人皆遷一官罷恐非緣志文事也是時許公例罷去安得救解元獻耶慶厯四年正月燕王薨九月晏公乃罷相實用蔡君謨孫之翰章疏也殖私規利亦章疏中語文定所記二事皆誤曽布云晏元獻當國宋子京為翰林學士晏愛宋之才雅欲旦夕相見遂稅一第於旁近遷居之遇中秋啟宴召宋出妓飲酒賦詩逹旦方罷翌日晏罷相宋當草詞頗極詆斥至有殖私規利之語方子京揮毫之際宿酲尚在左右觀者亦駭歎按殖私規利章疏中語也元獻實以九月十二日罷去中秋逺矣蘓子由謂景文救解元獻曽子宣謂景文詆斥晏公二者皆誤明道二年七月有誣諫官隂附宗室者徃時孫祖德知諫院范仲淹為左司諫不知宗室謂誰當考出李燾長編按范文正自開封貶知饒州吕夷簡執政以仲淹嘗宻請立皇太弟姪此景祐三年四月事也距明道才三年耳長編寳元元年亦載此事豈譛者之言乆已先入耶徃時學士入劄子不著姓但云學士臣某先朝盛度丁度並為學士遂皆著姓以别之其後遂以為故事出歐陽公歸田録按學士年表盛文肅景祐二年已遷参知政事明年丁文簡始入翰林二公未嘗並直也仁宗時一歲大旱時相希温成㫖時相謂賈文元請出宫人以弭災上從之雨未應上問臺官李柬之柬之曰惟䇿免之議未行耳是夕鎻院時相出判北京雨遂霔出王鞏聞見近録按賈文元之罷用中丞髙文莊之議也文元與吳正肅公不協數爭事上前文莊謂大臣廷爭為不肅則雨不時若因而罷之國史所載如此慶厯中鄭天休諸公復會李氏第既退達曉道遇李翰林造朝事遂喧傳言者論之宰相吕許公曰臣觀赴會者姓名皆舉朝賢俊安得許多人代之願召至中書戒勵上從之既召諸公無一人至者出王鞏聞見近録按慶厯元年五月庚午權三司使葉清臣知江寧府辛未参知政事宋庠知楊州樞宻副使鄭戩知杭州時宰相以庠戩清臣皆同年及第而並據要地以為朋黨故出之此仁宗實録中語也時吕公位昭文定國之言為吕公地耳然鄭文肅宋元憲皆已執政可召之戒勵耶張安道云吕許公免相晏元獻為政富鄭公自西都留守入参知政事深疾許公乞多置諫官以廣上聽上方嚮之而晏公深為之助乃用歐陽修余靖蔡襄孫沔等為諫官諫官之勢自此日横於是私說遂勝而朝廷輕矣出蘓轍龍川别志按慶厯三年三月戊子吕公罷章郇公晏元獻並相富鄭公自侍讀學士除副樞宻固辭癸亥王懿敏歐陽公余襄公並知諫院此時富公未受命也四月己酉蔡君謨知諫院八月丁未富公始復樞宻副使孫威敏公慶厯元年已知諫院此時出為兩浙提刑張公誤記矣慶厯中親事官乘醉入禁中仁宗皇帝遣諭皇后貴妃閉閤勿出后謹聽命張貴妃直趨上前明日上對輔臣泣下輔臣亦泣首相陳恭公毅然無改容上謂貴妃冐不測而来斯可寵也樞相乘間啟廢立之議張文定得其說即詣恭公以為不可恭公持議甚堅久而上復問之梁相適進曰一之已甚其可再乎聲甚厲既退上留適曰朕止欲稍加妃禮本無他意卿可安心羣論遂止出王鞏聞見近録陳恭公當國曽魯公由修注除待制恭公弟婦王冀公孫女曽出也恭公謂婦曰曽三從官喜否答曰三舅甚荷相公收錄但太夫人不樂責三舅曰汝三人及第必是全廢學丞相婣家備知之故除待制也恭公黙然未幾改知制誥蓋恭公不由科舉失於夷考耳按曽魯公自修注當遷舍人時首相賈文元與曽皆陳崇公堯咨之婿以親嫌為請乃除待制慶厯五年也明年文元罷曽復為舍人趙所記差誤慶厯八年三月甲寅御史中丞魚周詢答手詔所問居數日復上對曰近樞宻院改内省條令似與曩者負罪之人預為復進之地中外喧然以為不可樞宻院改内省條令不見於實録當考出李燾長編按此月丙寅詔樞宻院内臣諸司使副在邊五年而無過者遇帶御器械闕以名次取㫖帶御器械五年而無過者遇内侍省押班闕亦如之其内侍押班以上並聽特㫖乃除此仁宗實録所載也丙寅在甲寅後十二日周詢所條對當在三數日後其復上對又居數日則所言必指此耳唐子方言文潞公方仁宗大怒顧召宰相時宰相晏殊文彦博皆在樞宻使龎籍以使相在殿傍聞語髙亦登對叱介下殿按晏元獻公慶厯四年罷相去此十年矣龎莊敏時亦不帶平章事皇祐二年二月丙寅追封故宰臣王曽妻南陽縣太君蔡氏為莒國夫人繼室賛皇縣太君李氏為沂國夫人曽弟天章閣待制右諫議大夫子融辭一官乞追封之注曽為宰相有年何以妻無封而子融為請當考出李燾長編按國朝舊制大臣封妻則先亡者不得封故宋子京為沂公墓誌云公始合姓於蔡又合姓於李繼室以其妹後夫人獨偕老故啟許國享脂田焉據史蔡李二夫人皆稱太君則必以其子升朝而加贈是以未得國名也仁宗以後大臣妻存亡者皆得國封視舊制為優但未見所始耳皇祐四年二月傅永為户部副使初闗中用折十鐡錢盜鑄不可勝計公私患之永請變錢法至境問民所乏貸各種粮錢令麥熟納償而薄其息民大悅永亟檄州縣凡散二百八十萬緡大錢悉盡乃以聞已而朝廷變法遂下令以小折鐡錢三折大折鐡錢一民出不意破産失業自經死者甚衆而盜鑄亦以衰止注永前貸民大錢今但取小錢又以小錢三折當大錢一其名似優貸者其實隂奪盜鑄之利也永傳載此事殊不了了今畧加删潤使易曉出李燾長編按此傅永設䇿以㒺民也解之誤矣永初議廢大錢以官積大錢多慮虧國計故先以貸民而後更法方其貸時出大錢二百八十萬尋遂更制則民間實止為八十四萬緍爾其后縣官但按元籍取償故民不意破産失業至于自經使永出十而取三則何用亟檄州縣盡散大錢乃以上聞使貸者得大錢萬而償小錢三萬則當樂輸矣而何為失業自經耶故政和中改當十大錢為當三先數日執政爭輦大錢市金銀既而敕下中外傳以為笑即此比也永之䇿大抵使官無所虧而民受其患實甚誤矣至和元年八月梁適除觀文殿大學士注碧雲騢言適除大觀文由内降按舊相除觀文殿大學士非異恩也疑碧雲騢毁適太甚今不取出李燾長編按梁莊肅罷相七月戊辰也除觀文大學士八月丙午也相去才三十九日故事宰相以言罷其除職未有如此之遽者當是内降不疑以例考之晏相殊罷政後歴三州始除觀文殿大學士杜相衍終身不除職龎相籍罷政後二年始除節度使知并州皆十年内事耳梅聖俞當有所據而云至和元年九月吕溱王洙並為翰林學士故事翰林學士六員時楊察趙槩楊偉胡宿歐陽修皆為學士于是察加承㫖洙蓋第七員也温成皇后之䘮洙附㑹時事鈎摭非禮陳執中劉沆喜其助己故擢洙員外議者非之出李燾長編按學士年表太平興國八年五月在院學士李文恭宋文安吕文穆賈媧民李言幾凡五人而扈日用為承㫖徐鼎臣兼直院蓋七人也慶厯八年十二月至皇祐元年三月在院學士王文安孫文懿趙康靖錢修懿葉道卿彭利建及楊公偉凡七人嘉祐元年二月至二年七月在院學士趙康靖胡文恭歐陽文忠孫文懿王文恭曽宣靖及楊公偉亦七人非始於王原叔也三朝會要云學士無定員燾所云盖据王岐公續會要所書爾仁宗至和中鑄錢文曰至和元寳至和通寳皆眞篆書二品至和重寳眞書一品仁宗嘉祐元年鑄錢文曰嘉祐元寳嘉祐通寳並眞篆文二品嘉祐元年范鎮請立皇嗣疏注周王薨眞宗養宗室子當考出李燾長編按眞宗皇帝聖嗣未立嘗以緑車髦節召濮安懿王養之宫中蜀公所言蓋指此也進退宰相其帖例草儀皆出翰林學士舊制學士有闕則第一㕔舍人為之嘉祐末王荆公為閤老會學士有闕韓魏公素忌介甫不欲使之入禁林遂以張方平為承㫖蓋用舊學士也既而魏公罷政議論皆出安道之手按内外制題名記雍熈二年學士扈日用罷蘇太簡自第三㕔舍人代之而趙昌言宋凖皆位太簡上不問也淳化二年學士闕召韓丕諫議及畢文簡為之而躐向文簡四年韓畢罷錢宣靖為第二㕔舍人代之而遺柴承務至道初錢公入宥府宋持正王元之以第三第四㕔繼之而復遺吕祐之和㠓其後若祥符中李相州王沂公並入翰林而躐朱閤老巽天聖中錢希白蔡文忠章文憲繼除學士而躐張閤老尚賢如此者多矣治平初王荆公除内艱累召不至若便除北扉恐無此例韓公雖忌王然以故事考之未見其失仁宗實錄天聖四年五月丁丑蔡齊章得象並為學士時舍人院無知制誥特詔學士夏竦草詞按張師德此年閏五月辛未始以左諫議大夫出院蓋此時師徳正移疾耳治平四年十一月知諫院陳薦楊繪皆請治薛向种諤之罪以安夏人不聽按陳薦知諫院在熈寧元年正月其二月种諤乃貶此不當附在四年又云不聽也熈寧元年七月戊戍知諫院錢公輔言祠部遇歲飢河決鬻度牒以佐一時之急請自今恩賜度牒皆减半從之注前此未嘗書賣度牒因公輔言表而出之鬻度牒蓋始此年按實録治平四年十月庚戍賜陕西轉運司度牒千糴榖賑濟此云始於熈寧元年蓋誤龍衮著江南野錄云歐陽觀義行頗腆先出其婦有子登科詣之待以庶人觀乃文忠父文忠自識其父墓初無出婦之玷衮與文忠為鄉曲豈非平時有宿憾與夫祈望不至云爾不可不為之辯出王明清揮麈後録按歐陽公瀧岡阡表以熈寧二年立而云既葬之六十年逆數之葬時公才四歲耳表中雖不見出婦事然以志考之觀年五十九卒官而鄭夫人年方二十九必非元配蓋觀已出婦其子固難言之歐陽公撰族譜云觀二子昞當是其前婦之子所謂卒頼以葬者也文忠後任昞之子嗣立為廬陵尉見焚黄祭文中又文忠貶滁州謝上表云同母之親惟有一妹足見昞為前母之子不疑仲言雖欲為歐陽公諱之其意甚羙然非事實况觀之前婦實有過亦未可知孔子子思尚明言之特歐陽公不可自言他人何諱之有祖無擇知杭州王介甫惡之監司承風㫖以贓濫聞遣御史王子韶按治鍜鍊無所得坐遺遊客酒三百小瓶責節度副使安置士大夫寃之同時有知明州苖振監司亦因觀望發其贓罪朝廷遣張横渠先生按治悉平反之罪止罰金其幸不幸有如此出邵伯温聞見前錄按實錄熈寧二年九月詔御史王子韶體量苖振不法事閏十一月命沈衡鞫祖無擇于秀州徐九思鞫振于明州皆以王子韶得其不法事故也尋改命張載劾振明年七月無擇貶散官居壽州九月振貶散官居復州邵實甚誤王安石薦李定陳㐮彈之未行間除御史宋次道李大臨蘇子容不草制封還之其後攝官修起居章衡行下賢不肖於此可見出韓瓘編器之語錄按李資深制乃直舍人院蔡仲遠行之非章衡也國朝致仕官帶職歐陽公始以太子少師帶觀文殿學士致仕示特恩也故謝表曰道愧師儒乃忝春官之峻秩身居畎畝猶兼書殿之隆名自是以為例出王明清揮麈前録按國朝臣僚帶職致仕自熈寧四年二月王仲儀始是年六月歐陽公乃還政非事始也熈寧四年十月庚申利路轉運判官屯田郎中鮮于侁權發遣轉運副使初詔諸路監司各定助役錢數轉運使李瑜欲定四十萬侁以為本路民貧二十萬足矣與瑜議不合各具利害奏上是侁議因以為諸路率仍罷瑜而侁有是命又云鄧綰言瑜務聚歛提刑周約同簽書乞重絀以警諸路瑜約皆坐責尋復之出李燾長編按實録此年十月丁巳利路轉運判官鮮于侁為副使後二十日丁丑利路轉運使李瑜以判三司都理欠慿由司召乃是美遷明年四月戊午御史張商英言知州周永懿以贓敗轉運使李瑜提刑周約嘗交章薦舉不可不懲詔獄具取㫖後瑜約及同提刑羅居中皆坐奪一官據此則初不縁役錢二書皆誤熈寧四年十一月太學講官六員焦千之王汝翼梁師孟顔復盧侗皆罷獨留蘇液出李燾長編按實録十一月戊申判國子監常秩言考定直講焦千之王汝翼為上等梁師孟顔復盧侗為下等詔悉罷之是年十月丙辰蘇液已先除樞宻院檢詳文字未嘗留液也元祐實録差誤紹聖史臣已辨之子復又誤矣據紹聖元年中書舍人同修國史蔡卞奏一取到國子状蘇液熈寧三年離監千之等係四年十一月罷職今修實録官稱留液未悉憑何文字修纂熈寧五年三月戊戌富弼授司空兼侍中致仕按富公實以衮鉞掛冠此云左貂蓋誤熈寧五年九月先是檢正官章惇使湖南張商英為通川縣主簿惇嘉其才而薦之按章子厚以五年七月使湖北張天覺四年十二月已除中書檢正官蓋子厚四年三月使渝州時薦之此誤記也商英時為武寧軍節度推官知渝州南川縣熈寧六年北人遣蕭禧来議地界事詔韓玉汝館伴至驛神宗令李舜舉以朱筆畫一圖子示禧依此分撥舜舉初不與館伴議遽出圖韓急顧舜舉取置懷䄂禧果欲索㸔韓云李御藥自與某論它事即已因入奏面陳山川形勢纎悉皆繫利害不可輕許神宗云卿言大是朕思慮初不至此按史熈寧七年三月丙辰遼主使興復軍節度使蕭禧来求蔚應朔三州並邊之田先是正月丁未命知忻州蕭士元樞宻院兵房檢詳文字吕大忠與北人議地界禧既至後五日又命太常少卿劉忱同商量癸亥入辭報書曰竊惟兩朝撫有萬宇豈以尺土之地而輕累世之懽當遣官司各加覆視儻事由夙昔固難狥從或誠有侵踰豈恡改正甲子遣天章閣待制河北都轉運使韓縝報聘大忠乞命樞宻院錄前後照據文字令縝賫至北庭使遼主知本末其後縝至遼不果致但與押燕蕃相仲熈畧相酬對而還四月丁酉遼主遂遣樞宻副使同平章事蕭素来議地界于代州境上素自以使相欲主南面忱等不許事聞九月戊申詔忱與素等會于大黄平用賔主禮相見時大忠以憂去詔忱持議不諧則許以南北堡鋪中間為兩不耕地又不可則以中間為界素不從朝議以士元失辭十一月丙申起復大忠閤門副使知石州代士元議事忱與素三會于大黄平素漫指分水嶺為界忱不許相持久之八年三月庚子遼主再使禧来聘書詞不遜于是王安石再入相曰將欲取之必姑予之辛丑詔輔臣及忱大忠同對資政殿二人執不予安石不然之更遣縝及樞宻都承㫖張誠一乘傳至河東與遼人會議大忠又言遼人所求地西起雪山東接雙泉為地五百里不可聽又言遼人利吾金帛兵弱而惰城池器械不精民苦虐政又慮西夏塔坦乘之其不可動者五請姑以五寨及治平中所侵十五鋪予之安石不從己酉詔大忠持餘服縝將行上遣禧復命禧不聽又遣内侍李舜舉諭以長連城六蕃嶺許之禧不受命壬子詔輔臣對資政殿癸丑命知制誥沈括報聘戊午括等對資政殿時禧留京師已踰月上許以遼人見開濠塹及置鋪所在分水嶺為界又以報書示之丙寅禧乃辭去括亦行七月丙子遣縝河東分畫戊寅又遣四方館使李評十月己酉又遣樞宻承㫖曽李寛十二月辛亥縝畫地界還除羣牧使十年六月壬寅縝以分畫之勞賜金帶十二月癸巳上地圖蓋自七年之春至十年之冬前後歴四年而地界始畢凡東西棄地七百餘里其後元祐間臺諫累章劾縝奉使辱國而罷相者此也伯山謂玉汝館客時持不許之論上以為然全失其實地界事久不決神宗令近璫劉惟簡賫手劄責韓玉汝云疆事訪問文彦博曽公亮皆言南北通好百年生靈得以休息有所求請當且随宜應付朝廷已許而卿猶固執萬一北敵生事卿家族可保否韓具奏敵情無厭累朝以来常患應接太遽致令得遂狡謀臣不敢以家族為慮上誤國事上察其忠賜以御服貂裘按熈寧七年十月壬申上以北人詭詞求地不已遣使問韓富曽文四公于外韓忠獻言北人見形生疑謂我有復燕薊之意其事有七宜遣使報聘諭以疆土素定其可疑之形如將官之類則因而罷之富文忠言朝廷諸邊用兵敵所以先期啟釁不若委邊臣持舊来圖籍與之詰難萬一入㓂但嚴兵備之文忠烈言敵人之請宜以誓書折之若萌犯順之心當預嚴兵備曽宣靖言宜遣人報聘以不可侵越諭之萬一犯邊先絶其歲賜蓋四公悉持不予之論此云文曽皆言冝随冝應付妄矣馮當世為樞宻使三司火神宗御右掖門視之顧近璫曰急促馬歩司就近遣兩指揮兵士救之當世奏曰故事發兵須得樞宻院宣㫖近臣傳宣發兵不可啟上然之即於榻前出宣付近璫而出神宗數嘉之時論以為得體按實録熈寧七年九月三司火考之國史馮文簡以熈寧三年六月自翰林除樞宻副使九月遷㕘知政事九年十月自成都召知樞宻院事元豐三年九月遷使當三司火時文簡實在政塗陳成肅升之為樞宻使吳正憲充蔡敏肅挺為副使定國誤也是月馬帥賈逵歩帥宋守約皆坐不救三司火逵降秩守約罰金定國謂遣馬歩兩指揮恐誤矣熈寧中王和甫尹開封忽内降文字一紙乃陳首有謀亂者姓名凡數十人内有一薛六郎者居甜水巷以典庫為業和甫以禮呼至宻問與何人為寃薛言有族妹之子近来貸負不從怒罵而去和甫追其甥方在瓦市觀傀儡戯失聲曰豈非那事踈脫也既至不訊而服和甫曰小鬼頭没三思至此何必窮治杖而遣之一府歎伏出王仲言揮麈後錄蔣子禮所次其曽大父頴逸史與此大意略同但所告凡八十人所呼乃張三郎居城北所怨乃劉永祚學究和甫令永祚覆冩其書皆同上遣内侍馮宗道監鞫斬永祚於市未幾和甫除右丞心傳按蔣書首末最詳當以為正考之國史和甫以元豐五年自府尹拜右轄熈寧中尚未尹開封王録誤也况告數十人反詔獄窮治不實而但杖遣之恐無此理京朝官四年磨勘原無著令熈寧中審官院率行之至今以為制出張芸叟畫墁集按國朝舊制百官無磨勘遇郊赦則遷一官真宗用孫漢公之議始命京朝官三年一進秩其後天禧天聖明道景祐慶歴之際沿革不常治平三年始著令待制以上六年遷二官京朝官四年遷一官芸叟誤也元豐初蔡確排吳充罷相王珪畏之引為執政確謂珪曰上厭公矣珪曰柰何確曰上久欲收復靈武公能任責則相位可保也珪喜謝之適江東漕張琬有違法事帝語珪欲遣官按治珪以告都檢正俞充琬知之上章自辯帝以詰珪珪謂充曰某與君俱得罪矣然有一䇿當除君帥環慶亟上取靈武之章上喜罪可免乃除充待制帥環慶其後遂有靈武之役推其兵端由王珪避漏泄上語之罪也案實録元豐三年五月知慶州俞充罰銅三十斤坐為都檢正日江東漕何琬劾知潤州吕嘉問充以語人章未下而嘉問上疏自理也此時充帥環慶久矣方蔡新州執政吳正憲公尚在位子文所記不必審詔議濮王典禮王珪與禮官合奏王冝稱皇伯三夫人當封大國執政不以為然其後三夫人卒如珪議按史三夫人未嘗加封故李邦直熈寧八年撰韓魏公行狀曰英宗所生迄今為仙遊縣君識者皆疑其非禮意元豐二年五月始詔三夫人並稱曰王夫人遷祔濮園未嘗封大國也李邦直撰禹玉神道碑亦云治平中議追尊濮王公執用封期親尊屬故事執政以為不然公持之卒不奪其後諫官御史爭論久不決帝以手詔裁定多如其初邦直所云但指不稱皇耳此謂三夫人卒如珪議者實甚誤近歲前執政官到闕止繫御仙花帶從官非帶學士亦不敢繫待制自如本品無職則在庶官班中皆繫皂帶蓋閤門之制不知衝改始何時辨云元豐二年元絳罷政以本官知亳州特令服金帶如學士則非特㫖雖學士所謂金帶亦不得矣大觀初著令前執政許服毬文帶而此書所記近歲閤門之制又如此何耶元厚之許服帶如學士謂得繫御仙花金帶仍佩魚也厚之以言罷不帶職故以此優之此云非特㫖雖學士亦不得蓋誤矣淳熈中王仲行罷吏部尚書不帶職帥浙東入辭服金帶佩魚而入閤門吏却之乃去魚不可則改紅帶又不可則卒改皂帶仲行甚不平後數年始有㫖前侍從不帶職許服紅鞓黒犀帶仍佩魚遂為故事元豐五年十月壬申發常平錢八百萬緡成元豐庫注張舜民小史云神宗於崇政殿後設二十四庫或即元豐庫甞考實録卷末云每庫以詩一字目之詩凡三十二字又别置庫賦詩二十字不知庫名出李燾長編按國史食貨志上即景福殿庫聚金帛元豐元年始更庫名凡三十二字以眞宗實錄考之景福殿庫崇政殿後庫内藏庫皆一庫也蓋藝祖始下諸國聚其金帛於講武殿後廊謂之封樁庫太平興國三年十月改左藏北庫為内藏庫改封樁為景福内庫併𨽻内藏而講武殿旋改為崇政張芸叟所云即内藏耳元豐庫神宗所創在太府寺南非崇政殿後庫明甚國初以来開封府未嘗三獄同空元豐五年王安禮知府乃謀作天府獄空以圖進用時有御史劾其詐妄朝廷按視獄皆空御史以罪斥安禮拜右丞紹聖崇寧以後躁進之徒用此術奏獄空者多矣朝廷遂立遷一官為賞格長編五年四月丁巳注鮮于綽云中行坐論安禮獄空絀按實録元豐五年四月開封府言三院獄空詔知府王安禮進一等大理卿崔台符言本寺獄空詔台符減三年磨勘會五月大改官制安禮以翰林學士與同列蒲宗孟俱執政蒲左丞王右丞時侍御史蒲中行以與安禮爭盜賊名簿不實罷非為劾獄空也據國史天禧四年五年開封府此歲獄空蔡所記四者皆謬元豐六年六月丁巳執政將劾大辟不應讞者刑部郎中韓晉卿適白事省中因曰讞而獲戾讞不至矣朝廷從之出晉卿傳按實録是日詔大理寺刑名疑慮及情法不稱奏裁公案送定斷官㸔詳如非疑慮及情法不稱並免收坐從本寺請也此時晉卿為大理少卿所書刑中及因白事皆小誤元豐七年三月己巳編𠡠成自嘉祐後立開封盜賊重法後稍及曺濮澶滑等州至元豐更定其法於是河北京東淮南福建等路用重法郡縣浸廣矣注刑法志有此不得其時因編𠡠成附見出李燾長編按實録嘉祐六年初命開封諸縣盜賊囊槖之家立重法治平二年九月命開封府判官王靖提舉捉殺府界及曹濮澶滑州未獲盜賊三年四月五日遂以開封之長垣考城東明縣及曹濮等四州為重法地分熈寧四年正月丁未淮南之宿州京西之滑州河北之澶州京東之濮州凡十三州並行重法十年五月八日安厚卿以中書檢正官體量河北京東盜賊又請之六月壬午詔山東河北十七州皆行重法曹澶濮州仍在其中十二月癸夘又行之福建下四州此云不得其時何也盖立盗賊重法自嘉祐至熙寧而刑法志云元豐盖史官之誤韓魏公父諫議大夫國華嘗仕於蜀蜀中士人胡廣善相術見諫議而竒之曰是必生貴子請納女焉後諫議守泉生魏公於泉州州宅按李邦直撰魏公行狀云公之所生母胡氏蜀士人覺之女追封秦國太夫人此云名廣蓋誤故事命相皆用上旬剛日元豐八年拜蔡韓二相以五月二十六日蓋鄧温伯失之按史神宗一朝命相韓康公王荆公以十二月十一日韓康公再相以四月十九日王荆公再相以二月十一日吳冲公王岐公拜相以十二月二十三日蔡持正拜相以四月二十二日皆在中下旬且荆公岐公持正制出皆柔日也頴叔徒見熈寧中富鄭公拜相以二月二日故有上旬之論不知亦偶然耳如太祖初拜趙中令為相乾德二年正月十三日也仁宗慶歴三年改命二相四月二十一日也至和二年並命文忠烈富文忠六月十一日也此三者不為不審矣然皆在中下旬中興後秦會之朱藏一趙元鎮張徳遠葉夢錫等亦以下旬大拜初無所拘此說牴牾孫叔易言嘗見監朱僊鎮使臣云少日作吳冲卿丞相直省官親見元豐中郭逵討交阯以重兵壓富良江與交人止一水隔冲卿忌其成功堂帖令班師逵逗遛不進交人大入全軍皆覆逵坐貶秩侔儲冲卿孫也大觀中以左道伏誅蓋天報之云出王明清揮塵後錄按國史郭仲通以南伐得罪詔獄窮治後得吳丞相書云安南事冝以經久省便為佳時丞相已病由是憂畏而薨未嘗下堂帖也蓋冲卿本意不欲取交州地為得之不足守而勤供費耳使仲通成功丞相必受上賞又何忌邪况班師大事不得㫖而下堂帖丞相且獲罪不輕詳見心傳所著建炎以來繫年要錄
