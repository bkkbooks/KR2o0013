  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0013_WYG_004-1a, image: WYG0686/WYG0686-0608c.png}
body:
  text: 舊聞證誤卷四宋李心傳撰日厯紹興元年六月命知南外宗室正事令懬選藝祖後宗子二人鞠之禁中是嵗辛亥也明年閏月乙未令畤除知宗正事五月乙亥阜陵入宫相去才四十日若德麟被旨其所選未必如此之速按令懬為思陵所眷而德麟以舊事談稹為上所輕恐未必以此委之方阜陵入宫時德麟亦未封王其後二人偶先後襲封或傳者因之而誤然德麟時在行在而令懬在泉南當考張浚既受黜陟之命參知政事席益簽書樞密院事徐俯大不平之指以為僣其敕勝非在朝廷日嘗見之前云某司次述事因右語云奉敕如何末以使御押字黃紙大字皆過于敕出朱勝非秀水間居録心傳嘗見永康軍昭惠靈顯真人復封王敕右語云右奉便宜聖旨云云紹興元年月日知樞密院事宣撫處置使臣張浚書名不押字朱公所云非也紹興四年趙鼎除知樞密院事充川陜宣撫處置使時勝非起復居位已纍章丐持餘服鼎窺宰席甚急被命殊不樂申請數十條皆不可行如隨軍錢物須七百萬緡勝非參告進呈指此一項言臣昔聞玉音趙鼎出使如張浚故事浚自建康赴蜀朝廷給錢一百五十萬緡今鼎所須三倍以上今嵗郊恩所費不資上曰奈何勝非曰可支三百萬緡半出朝廷已如浚數半令所部諸路漕司應付上可之既退鼎詬怒云令我作乞兒入蜀耶出朱勝非秀水間居録按趙忠簡奏疏云臣隨行錢帛各乞依張浚例初乞錢百萬後乞五十萬度牒二萬止得三千再乞得萬八千又乞始足元數臣日侍宸扆所陳乞已艱難如此况在萬里之外按度牒是時每道直二百千二萬道共直四百萬緡通見鏹為四百五十萬緡與此記不合若以初乞所許訃之則錢牒止得一百十萬緡亦未及魏公所持之數蓋忠靖所記有誤李端叔作范忠宣遺表紹興中趙元鎮作相提舉重修泰陵實録書成加恩吕居仁在玉堂取其中二句云惟宣仁之誣謗未明致哲廟之隂靈不顯一對于麻制中時人以為用語親切不以蹈襲為非也按紹興八年六月趙公以哲録成書遷特進曽尚書楙當制無此二語居仁所草乃再除特進非加恩也紹興壬戍罷三大帥兵柄時韓王世忠為樞密使語馬帥解潛曰雖云講和敵性難測不若姑留大軍之半于江之北觀其釁公其為我草奏以陳此事解用指為劄子韓上之已而付出秦會之語韓云何不素告我而遽為是耶韓覺秦詞色稍異倉卒皇恐即云世忠不識字此乃解潛為之使其上耳秦大怒翌日貶潛單州團練副使南安軍安置張子韶云出王仲言揮麈後録按解承宣初以趙忠簡引為步帥紹興八年忠簡罷解力求去九年夏罷為福建總管此時韓良臣為淮東宣撫使也十一年四月韓罷為樞密使乃命張嶽二將往山陽總其兵還屯京口十四年三月言者劾解本忠簡之客不從和議乃責散官安置南安軍王所聞皆誤先是七年十一月秦會之為樞密使奏令韓還屯京口韓言敵情難測將以計緩我乞留此軍遮蔽江淮上然之乃留屯山陽時忠簡再相解典步軍在金陵或指此也然當張通古來時韓五上疏力諌及蕭毅再至又力論其非請與敵使面議且上疏論會之誤國由是觀之韓非倉卒退避而諉之他人者子韶與解同謫居不應誤王之言未深考紹興戊午夏熙州野外濼水有龍見初於水面見蒼龍一條良久沒次日見金龍以爪托一嬰兒兒雖為龍所戲弄略無懼色三日金龍如故見一帝子乘白馬紅衫玉帶如少年中官狀馬前有六蟾蜍凡三時方沒郡人競往觀之相去甚近而無風濤之害熙州嘗以圖示劉豫劉不悅趙伯璘曽見之按劉豫以紹興七年丁巳冬廢故其詔書有曰建爾一邦逮今八稔謂自建炎四年除節制河南諸州郡至今通為八年也龍見之時豫已廢徙矣不知熙州何為以圖示之此所記誤吳才老舒州人飽經史而能文浮沉州縣晚始得丞太常紹興間尚需次也娶孟氏仁仲之妹貧往依焉仁仲自建康易帥浙東言者論謝上表中含譏刺詔令分析仁仲辨訴以謂久棄筆硯實託人代作孟雖放罪尋亦引間秦會之令物色知假手于才老臺評遂上敕罷其新任繇是廢斥以終按史孟信安紹興十二年四月自判紹興府奉詔迎梓宫請禮官與俱時才老為太常丞被旨偕行其年八月才老坐朋附免九月信安除樞密使十一月山陵攢畢孟出判福州未行改建康府十四年春移會稽此所云皆誤魯國大長公主避兵南來卜居台州詔即州賜第主享二十年薨于天台按大長公主以紹興十二年秋入覲太母其冬薨于臨安上臨奠此云薨于天台誤也但歸葬台州耳皇統四年秋元帥遣使報監軍時監軍者討蒙古曰南宋以重兵逼脅和約大定除措置備禦早晚兵到矣至次年冬十月元帥親統十萬衆水陸并集出王大觀行程録按皇統四年甲子本朝紹興十四年也前二年已分畫地界矣不知烏珠何以歷二年之久而後加兵于蒙古恐必有誤皇統七年春三月國使還蒙古許依所割地界牛羊倍增金國許賜牛羊各二十五萬口今又倍之每嵗仍賂絹三十萬匹綿三十萬兩許從和約按本朝嵗賂北人銀絹共二十五萬匹兩而北人遺蒙古乃又過之恐未必然紹興初昭慈聖憲皇后升遐朝論欲建山陵曽公卷持議以為帝后陵寢今存伊洛不日復中原即歸祔矣宜以攢宫為名僉以為當出王明清揮麈前録按昭慈遺誥已云權宜擇地攢殯又曰新製梓宫取周吾身以為異日遷奉之便公卷自金陵至行在后升遐必已半月遺詔既云然則此議恐非其所建也本朝母后經垂簾者例稱山陵然昭慈是時止稱園陵此記亦誤趙鼎起于白屋有鄙朴之狀一旦得志驟為驕侈以臨安相府為不可居别建大堂環植花竹坐側置四大爐日焚香數十斤使香煙四合謂之香雲出朱勝非秀水間居録王日嚴曮為少蓬權直禁林草秦會之加恩制取熊叔雅啓一聮入詞中云大風動地不移存趙之心白刃在前獨奮安劉之略翊日即除禮部侍郎出王仲言揮麈後録按中興玉堂制草此紹興二十年五月秦會之提舉玉牒進髙宗中興聖統加恩制也時日嚴以右史直北扉實當此制二十一年四月日嚴乃遷儀曹二卿仲言誤紹興己卯陳瑩中追諡忠肅其子應之為刑部侍郎往謝政府有以大魁為元樞者忽問云先丈何事得罪秦師垣耶出王眀清揮麈三録按陳公賜諡在二十六年七月是年丙子也湯進之實為元樞而陳資政誠之在翰林九月陳始除同知樞密院事距忠肅賜諡已五旬恐無緣始謝蓋一時好事者以為口實仲言未之考也胡寅者凶慝躁進之士也趙鼎薦之詞掖朝士皆畏之以行詞乖繆衆論不容乃稱父安國老疾逺在湖湘乞歸省于是差知永州寅攜妾居婺州久之不去有朝士范伯奮貽書責之寅以妾臨蓐為辭伯奮復曰妾産與父疾孰重寅訴于鼎改知嚴州鼎旋罷纍月復相欲召寅議者以不省父止之故事兩制以上方乘狨座餘不預也大觀中童貫新得幸以泰寧軍承宣使副禮部尚書鄭允中使遼國遂俱乘狨座繇是為例出王明清揮麈後録按貫以大觀二年建節久之進檢校司空易鎮泰寧政和元年秋乃出使此亦誤也承宣使政和七年始置本朝宰相兼公師者范魯公王文獻趙韓王薛文惠王文貞丁晉公馮文懿王文穆吕文靖韓忠獻曽宣靖冨韓公文潞公吕正獻蔡師垣秦師垣陳魯公而已餘皆罷政後方拜近日惟張魏公自外以少傅再拜右揆出王明清揮麈前録按吕文穆何伯通鄭逹夫余源仲王將明皆以宰相兼公師吕元直嘗除少保而不拜文潞公吕正獻乃以公師平章國事非宰相也韓退之詩不知官髙卑玉帶垂金魚若從本朝言之則極品有不得兼者本朝之制惟親王及勳舊大臣之為公師者乃得賜玉帶即近屬者與外戚之為郡王者或亦賜之真宗時嘗遍賜兩府大臣其後止及元宰而已渡江後異姓王亦得之按慶元令節文諸𢃄三品以上許服玉臣寮在京者不得施于公服然則三品得服玉𢃄本朝與唐制尚同但在京則不可施于朝服爾今公卿在外亦未有服玉者蓋循舊如此非謂法不可也白樂天聞白行簡服緋詩有綵動綾袍為趂行之句注云緋多以鴈銜瑞莎為之則知唐草服以綾且用織花者與今制不同今宗室外戚之親貴者或賜花羅公服亦此意也宣政間又有紗公服今廢禁中鐘鼓院在和寧門譙上其上鼓記五更已竟而外間通用漏刻方交五更也殺五更後譙上不復更擊鐘鼓需平明漏下二刻方椎鼓數十聲王禹玉宫詞云禁鼓六更交直早歸來還是立班時禹玉謂六更者明宫殿五更之外更有一更也其實宫鼓以外間四更促為五更故五鼓終竟時蚤聞于外間耳鼓節未嘗溢六也車駕宿齋青城則齋殿門內五更均促使短如宫中常節至青城門外則五夜平分須曉乃竟蔡絛百衲叢談云五更已滿將曉之時則又有謂之夜漏不盡刻文德殿鍾鼓院于夜漏不盡刻天既未曉則但撾鼓六通而無鉦點也故不知者乃謂禁中有六更吾于政和戊戍曽侍祠于宣和殿嘗備聞之據此則承平時蓋擊鼓六通此云惟數十聲未知孰是也楊廷秀云紹熙庚戍嵗考試殿廬夜漏殺五更之後復打一更問之雞人云官漏打六更按蔡程楊三人皆從官也所謂六更者皆親聞之而或云打一更或云撾鼓六通或云椎鼓數十聲竟無定論當考學士院具員文臣待制以上武臣正任防禦使以上蓋防禦使有超除節度使之理故皆入具貟按國朝防禦使雖有殊功未嘗徑建節也紹興末李寶以膠西之捷自遙蔡除節度使時號創見蔣所記誤唐制翰林學士本職在官下五代趙鳳為之始諷宰相任圜移在官上出葉夢得石林燕語按唐劉瑑撰王巨鏞碑稱翰林學士中散大夫中書舍人劉瑑栁公權撰何進滔碑稱翰林學士承旨兼侍書朝議大夫守工部侍郎知制誥栁公權白居易集載初除拾遺書稱翰林學士將仕郎守左拾遺白居易據此類皆職在官上又按元稹祭李尚書文稱中散大夫守中書舍人翰林學士元稹崔羣謝官狀稱朝議郎守尚書庫部員外郎翰林學士崔羣王源中撰李藏用碑稱中散大夫守尚書户部侍郎知制誥翰林學士王源中據此類皆職在官下五代趙鳳所移乃端明殿學士葉誤記也唐翰林學士結銜或在官上或在官下無定制豫家藏李藏用碑撰者言中散大夫守尚書户部侍郎知制誥翰林學士王源中王巨鏞碑撰者言翰林學士中散大夫守中書舍人劉瑑瑑仍不稱知制誥不可曉出葉夢得石林燕語按學士官至紫微舍人則銜內不繫知制誥三字所從來逺矣唐自代宗後歷德順憲穆敬五帝及懿宗皆不置節名出葉夢得石林燕語按懿宗延慶節此云不置非也前世牌額額必先挂而後書牌必先立而後刻魏凌雲臺至髙韋誕書榜即日皓首此先挂之驗也今則先書而後挂案晉書王獻之傳太元中新起太極殿謝安欲使獻之題榜以為萬代寶而難言之試謂曰魏時凌雲殿榜未題而匠者誤釘之不可下乃使韋仲將懸筆書之比訖鬚髮盡白才餘氣息據此則乃一時匠者之誤非古人皆先挂而後書也台州筆吏楊滌者能詩亦可觀其外氏唐元相國之裔偶持告身來乃微之拜相綸軸也銷金雲鳳綾新若手未觸白樂天作并書後有畢文簡夏文莊元莊簡諸公跋識甚多尋聞為秦熺所取恨當時不能入石也按考唐白傅集其在翰林嘗當五相制乃裴垍張𢎞靖李綘韋貫之武元衡爾其在中書嘗草微之諭德及翰林兩制蓋樂天以元和初為學士而微之長慶二年始入中書其相去逺矣此所記必有誤王景彛藏續皇王寶運録十卷多載唐中葉以後事所恨宋景文歐陽文忠諸公未曽見之其中載黃巢王氣一事云金州太白山人中和三年夏見刺史崔堯封云州北有牛山傍有黃巢谷金桶水今黃巢年號金統必慮王氣在北牛山請掘之則賊自敗散堯封大喜調義夫萬人掘牛山月餘崖奔十丈有一石桶上有一劍桶中有一黃腰獸自撲而死堯封奏其事加檢討司徒至秋中原尅平出王明清揮麈後録蔡元長帥成都嘗令費孝先畫卦影末後畫小池龍躍其中又畫兩日兩月一屋有鴟吻一人掩面而哭不曉其理後元長南竄死于潭州昌明寺始悟焉出王明清揮麈餘話按實録蔡京死于崇教寺遼亡逹錫林牙亦降後與尼堪雙陸爭道堪心欲殺之而口不言逹錫懼及歸帳即棄其妻攜五子宵遁深入沙漠立天祚之子梁王為帝出松漠記聞按三國謀謨録兩國編年皆云天祚出夾山以圖興復逹錫諫不聽乃稱疾不行天祚被執逹錫率殘衆奉梁王北奔據此則逹錫未嘗降使其果降則梁王何以得免洪記恐誤也天祚四年趙晉秦許四王晉王先誅死而無梁王或者其後一王改封亦未可知姑從記聞髙麗厯日自契丹天慶八年以後皆闕不紀壬戍歲改皇統辛未改天德癸酉改貞元丙子改正豐至癸未歲又闕直至壬辰歲方紀大定十二年不可考云案壬戍紹興十二年也熊子復中興小厯改皇統在十四年按辛酉歲烏珠與本朝書已稱皇統元年而王大觀行程録亦云皇統八年歲次戊辰戊辰紹興十八年逆數之當以十一年改元為正此所記誤又正隆乃海陵年號見于隆興時政記亦不當作正豐辛巳歲葛王即位于會寧改元大定至壬辰為十二年不誤但不知癸未歲何以缺豈非金方紛亂不暇頒厯于屬國故耶
