body:
  text: 舊聞證誤史評類提要臣等謹案舊聞證誤四卷宋李心傳撰心傳有建炎以來繫年要録已著録要録於諸書訛異多隨事辨正故此書所論北宋之事為多不複出也或承於南宋之事則要録之所未及此補其遺也凡所見私史小説上自朝廷制度沿革下及嵗月之參差名姓之錯互皆一一詳徵博引以折衷其是非大致如司馬光之通鑑考異而先列舊文次為駁正條分縷析其體例則如孔叢之詰墨其間决疑訂舛於史學深為有禆非淹通一代掌故者不能為也宋史藝文志載此書作十五卷自明代已無傳本故薛應旂王宗沐等續修通鑑商輅續修綱目皆未見其書今從永樂大典中所載蒐羅裒輯尚得一百四十餘條謹略依時代先後編次排纂析為四卷雖非心傳之全帙然就所存者觀之其資考證者已不少矣原書於所辨諸條各註書名永樂大典傳冩脫漏僅存其十之三四謹旁加搜討凡有可考者悉為補注無可考者則仍其舊心傳所辨間有脫文今無別本可校亦不敢意為増損焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:fa634816d3e26ae96c5f6a05b16ee7222f564d0c25c409a1985c9f5e04ca99fa
